<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DENTAL LAB SERVICE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦷</text></svg>">
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>

<body>
<div th:replace="fragments/nav :: main-menu"></div>

<section>
  <h2>Запись новой работы:</h2>

  <form th:action="@{/main/dental-works}" method="post" class="work">
    <label for="patient">пациент:</label><br>
    <input type="text" id="patient" name="patient" required><br>

    <label for="clinic">клиника:</label><br>
    <input type="text" id="clinic" name="clinic" required><br>

    <label for="product">вид работы:</label><br>
    <select id="product" name="productId"
            style="width: 230px; height: 30px; font-size: 22px;" required>
      <option value=""> </option>
      <option th:each="item : ${map}"
              th:value="${item.id}"
              th:text="${item.title}">
      </option>
    </select><br>

    <label for="quantity">количество:</label><br>
    <input type="number" id="quantity" name="quantity" min="0" max="32"><br>

    <label for="complete">дата назначения:</label><br>
    <input type="date" id="complete" name="completeAt"><br>

    <label for="comment">комментарий:</label><br>
    <textarea id="comment" name="comment" rows="3" cols="25"
              placeholder="Введите комментарий (необязательно)..."
              style="font-size: 18px;"></textarea><br>

    <br>
    <button type="submit" class="medium-button">СОХРАНИТЬ</button>
  </form>
</section>
<section>
  <form method="get" th:action="@{/main/reports/works/upload}" class="work" style="width: 256px">
    <input class="low-button" type="submit" value="загрузить EXCEL отчёт">
  </form>
</section>
</body>
</html>
