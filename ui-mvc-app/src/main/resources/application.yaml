server:
  port: 8081
  servlet:
    session:
      cookie:
        secure: false
        http-only: true
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 50MB
  application:
    name: ui-application
  thymeleaf:
    cache: true
  web:
    resources:
      static-locations: classpath:/static/
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${project.variables.keycloak.client-id}
            client-secret: ${project.variables.keycloak.client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: ${project.variables.keycloak.url}/realms/${project.variables.keycloak.realm}
  redis:
    host: ${project.variables.redis.host}
    port: ${project.variables.redis.port}
    timeout: 6000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://alloy:4318
  traces:
    exporter: otlp
    sampler: always_on
  metrics:
    exporter: none
  logs:
    exporter: none
