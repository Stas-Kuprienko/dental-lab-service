version: '3.9'

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true


services:

  config-server:
    build:
      context: .
      dockerfile: /cloud/config-server/Dockerfile
    container_name: config-server
    networks:
      - public
      - internal
    expose:
      - "8888"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s


  eureka-server:
    build:
      context: .
      dockerfile: /cloud/eureka-server/Dockerfile
    container_name: eureka-server
    networks:
      - internal
    expose:
      - "8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s


  api-gateway:
    build:
      context: .
      dockerfile: ./cloud/gateway/Dockerfile
    container_name: api-gateway
    networks:
      - public
      - internal
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      dental-lab-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s


  dental-lab-service:
    build:
      context: .
      dockerfile: ./dental-service/Dockerfile
    container_name: dental-lab-service
    networks:
      - public
      - internal
    expose:
      - "8079"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s


  ui-mvc-app:
    build:
      context: .
      dockerfile: ./ui-mvc-app/Dockerfile
    container_name: ui-mvc-app
    networks:
      - public
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      api-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  telegram-bot:
    build:
      context: .
      dockerfile: ./telegram-bot/Dockerfile
    container_name: telegram-bot
    networks:
      - public
      - internal
    expose:
      - "8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      api-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  postgres:
    container_name: dental_db
    image: postgres:15.3-alpine
    networks:
      - internal
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    expose:
      - '5432'
    volumes:
      - ./volumes/postgresql/data:/var/lib/postgresql/data
      - ./config/postgesql/create-db.sql:/docker-entrypoint-initdb.d/create_database.sql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  keycloak:
    container_name: dental_keycloak
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm
    networks:
      - public
      - internal
    environment:
      - KC_HOSTNAME=${DOMAIN_KEYCLOAK_PATH}
      - KC_HOSTNAME_ADMIN_URL=${DOMAIN_KEYCLOAK_PATH}
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=true
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HEALTH_ENABLED=true
      - KC_CACHE=local
      - KC_CACHE_STACK=simple
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres/keycloakdb
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/keycloak/realms:/opt/keycloak/data/import
      - ./config/keycloak/themes:/opt/keycloak/themes
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl --head -fsS http://localhost:9000/health/ready | echo $?" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - public
      - internal
    expose:
      - "9000"
    ports:
      - "9001:9001"
    environment:
      - MINIO_REGION_NAME=us-east-1
      - MINIO_REGION=us-east-1
      - MINIO_ROOT_USER=${MINIO_ROOT_USERNAME}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - ./volumes/minio_data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    container_name: dental_redis
    image: redis:latest
    networks:
      - internal
    expose:
      - '6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - ./volumes/redis/data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s


  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    networks:
      - public
      - internal
    expose:
      - "5672"
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.0
    networks:
      - public
      - internal
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
      - loki
      - promtail
      - tempo
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.54.1
    networks:
      - internal
    expose:
      - "9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  loki:
    container_name: loki
    image: grafana/loki:3.1.1
    networks:
      - internal
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki/local-config.yaml:/etc/loki/local-config.yaml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  tempo:
    container_name: tempo
    image: grafana/tempo:2.6.1
    networks:
      - internal
    expose:
      - "3200"
      - "4318"
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo.yml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  promtail:
    container_name: promtail
    image: grafana/promtail:3.1.1
    networks:
      - internal
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./logs:/logs
      - ./config/promtail/config.yml:/etc/promtail/config.yml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
