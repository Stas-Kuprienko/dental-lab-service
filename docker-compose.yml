version: '3.9'

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true


services:

  dental-lab-service:
    build:
      context: .
      dockerfile: ./dental-service/Dockerfile
    container_name: dental-lab-service
    networks:
      - public
      - internal
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PROJECT_VARIABLES_SERVICE-API-URL=${DOMAIN_SERVICE_PATH}
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  ui-mvc-app:
    build:
      context: .
      dockerfile: ./ui-mvc-app/Dockerfile
    container_name: ui-mvc-app
    networks:
      - public
      - internal
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PROJECT_VARIABLES_DENTAL-LAB-API_URL=${DOMAIN_SERVICE_PATH}/api/v1
    depends_on:
      dental-lab-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  telegram-bot:
    build:
      context: .
      dockerfile: ./telegram-bot/Dockerfile
    container_name: telegram-bot
    networks:
      - public
      - internal
    expose:
      - "8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PROJECT_VARIABLES_DENTAL-LAB-API_URL=${DOMAIN_SERVICE_PATH}/api/v1
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      dental-lab-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro


  postgres:
    container_name: dental_db
    image: postgres:15.3-alpine
    networks:
      - internal
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    expose:
      - '5432'
    volumes:
      - ./volumes/postgresql/data:/var/lib/postgresql/data
      - ./config/postgesql/create-db.sql:/docker-entrypoint-initdb.d/create_database.sql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  keycloak:
    container_name: dental_keycloak
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm
    networks:
      - public
      - internal
    environment:
      - KC_HOSTNAME=${DOMAIN_KEYCLOAK_PATH}
      - KC_HOSTNAME_ADMIN_URL=${DOMAIN_KEYCLOAK_PATH}
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=true
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HEALTH_ENABLED=true
      - KC_CACHE=local
      - KC_CACHE_STACK=simple
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres/keycloakdb
      - KC_DB_USERNAME=${POSTGRES_USERNAME}
      - KC_DB_PASSWORD={POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/keycloak/realms:/opt/keycloak/data/import
      - ./config/keycloak/themes:/opt/keycloak/themes
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl --head -fsS http://localhost:9000/health/ready | echo $?" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - public
      - internal
    expose:
      - "9000"
    ports:
      - "9001:9001"
    environment:
      - MINIO_REGION_NAME=us-east-1
      - MINIO_REGION=us-east-1
      - MINIO_ROOT_USER=${MINIO_ROOT_USERNAME}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - ./volumes/minio_data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    container_name: dental_redis
    image: redis:latest
    networks:
      - internal
    expose:
      - '6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - ./volumes/redis/data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s


  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./ssl:/etc/ssl:ro
    networks:
      - public
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
