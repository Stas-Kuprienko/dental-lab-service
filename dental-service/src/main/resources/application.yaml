    keycloak:
      url: http://localhost:8080
      username: admin
      password: admin
      realm: dental-lab
      client-id: dental-lab-client
      client-secret: 9S95xSQgkdxbt9VxNPdHoULyTyaLZIWG
    datasource:
      database: dental_lab
      url: localhost:5432
      username: postgres
