server:
  forward-headers-strategy: framework
  port: 8082

spring:
  application:
    name: dental-lab-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${project.variables.keycloak.url}/realms/${project.variables.keycloak.realm}
  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${project.variables.datasource.url}/${project.variables.datasource.database}
    username: ${project.variables.datasource.username}
    password: ${project.variables.datasource.password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    url: jdbc:postgresql://${project.variables.datasource.url}/${project.variables.datasource.database}
    user: ${project.variables.datasource.username}
    password: ${project.variables.datasource.password}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${project.variables.redis.host}
    port: ${project.variables.redis.port}
    timeout: 6000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  mail:
    host: ${project.mail.smtp.host}
    port: ${project.mail.port}
    username: ${project.mail.service.user}
    password: ${project.mail.service.password}
    protocol: ${project.mail.protocol}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
logging:
  charset:
    console: UTF-8
springdoc:
  info:
    title: Dental Lab Service
    description: Open API for Dental Lab Service
    version: 1.0.0
    url:
  swagger-ui:
    path: /docs/index.html
    oauth:
      client-id: swagger-ui-client
      use-pkce-with-authorization-code-grant: true
  api-docs:
    path: /docs/v3/api-docs
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  paths-to-match: /api/v1/**


