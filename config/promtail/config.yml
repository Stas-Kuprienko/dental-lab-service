server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://host.docker.internal:3100/loki/api/v1/push

scrape_configs:

  - job_name: dental-lab-service
    static_configs:
      - targets:
          - localhost
        labels:
          application: dental-lab-service
          __path__: /logs/dental-lab-service/application.log

  - job_name: telegram-bot
    static_configs:
      - targets:
          - localhost
        labels:
          application: telegram-bot
          __path__: /logs/telegram-bot/application.log