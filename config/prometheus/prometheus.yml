global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'dental-lab-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'telegram-bot'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['host.docker.internal:8083']

rule_files:
  - "/etc/prometheus/alerts.yml"