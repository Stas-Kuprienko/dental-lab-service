global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dental-lab-prod'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'dental-lab-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['dental-lab-service:8082']
        labels:
          application: 'dental-lab-service'

  - job_name: 'ui-application'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ui-application:8081']
        labels:
          application: 'ui-application'

  - job_name: 'telegram-bot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['telegram-bot:8083']
        labels:
          application: 'telegram-bot'

  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']