server:
  port: 8082

spring:
  application:
    name: gateway
  profiles:
    active: dev
  config:
    import: "configserver:"
  cloud:
    config:
      uri: http://host.docker.internal:8888
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: dental-lab-service
          uri: lb://dental-lab-service
          predicates:
            - Path=/api/v1/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${project.variables.keycloak.url}/realms/${project.variables.keycloak.realm}

eureka:
  client:
    service-url:
      defaultZone: ${project.variables.eureka-server.url}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: ${project.variables.alloy.url}
  traces:
    exporter: otlp
    sampler: always_on
  metrics:
    exporter: none
  logs:
    exporter: none
