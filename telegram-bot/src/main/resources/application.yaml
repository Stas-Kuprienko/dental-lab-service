server:
  port: 8083

spring:
  application:
    name: telegram-bot
  redis:
    host: ${project.variables.redis.host}
    port: ${project.variables.redis.port}
    timeout: 6000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

telegram:
  api:
    path: "https://api.telegram.org/file/bot"


project:
  variables:
    dental-lab-api:
      url: http://localhost:8082/api/v1
    dental-lab-site:
      url: http://localhost:8081
    redis:
      host: localhost
      port: 6379
    telegram:
      username: {bot-name}
      bot-token: {bot-token}
    keycloak:
      client-id: telegram-bot-client
      client-secret: lRPMOwOylXUUhlUXcHYqye92jLLZh11R
  telegram:
    link-duration-minutes: 10
    otp-length: 7
    proxy:
      enable: false
      host: "127.0.0.1"
      port: 10808
      type: HTTP
